services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fugl
      POSTGRES_PASSWORD: fugl_secret
      POSTGRES_DB: traekfugl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fugl -d traekfugl"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "9382:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fugl:fugl_secret@db:5432/traekfugl
      DATABASE_URL_SYNC: postgresql+psycopg2://fugl:fugl_secret@db:5432/traekfugl
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/code/app

volumes:
  pgdata:
